<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusFlow - Pomodoro Timer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 text-center">
          <h1 class="mb-4 fw-bold">FocusFlow</h1>

          <div class="card shadow-lg p-4 mb-4">
            <div class="btn-group mb-4" role="group">
              <button
                type="button"
                class="btn btnOutline active"
                onclick="setMode('work')"
              >
                💮 Work
              </button>
              <button
                type="button"
                class="btn btnOutline"
                onclick="setMode('short')"
              >
                💮 Short Break
              </button>
              <button
                type="button"
                class="btn btnOutline"
                onclick="setMode('long')"
              >
                💮 Long Break
              </button>
            </div>

            <div class="display-1 fw-bold mb-3" id="timer">25:00</div>

            <div class="progress mb-4" style="height: 10px">
              <div
                id="progress-bar"
                class="progress-bar progress-bar-striped progress-bar-animated"
                role="progressbar"
                style="width: 100%"
              ></div>
            </div>

            <div class="d-flex justify-content-center gap-3">
              <button
                id="start-btn"
                class="btn btn-lg px-4"
                onclick="toggleTimer()"
                style="background-color: #ff6fa5; font-weight: bold"
              >
                Start
              </button>
              <button
                class="btn btn-secondary btn-lg px-4"
                style="font-weight: bold"
                onclick="resetTimer()"
              >
                Reset
              </button>
            </div>
          </div>

          <!-- Currently working on this part -->
          <div class="card shadow-sm p-3">
            <h5>Current Task</h5>
            <input
              type="text"
              id="task-input"
              class="form-control text-center"
              placeholder="What are we focusing on?"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
