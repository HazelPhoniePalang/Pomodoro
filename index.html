<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinky Flow - Pomodoro Timer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .task-table {
        font-size: 14px;
      }
      .task-table tbody tr {
        vertical-align: middle;
      }
      .task-table tbody tr.completed {
        background-color: #f0f8f0;
      }
      .task-table tbody tr.completed td {
        color: #6c757d;
        text-decoration: line-through;
      }
      .task-checkbox {
        cursor: pointer;
        width: 20px;
        height: 20px;
      }
      .btn-delete {
        padding: 4px 8px;
        font-size: 12px;
      }
      .task-count {
        font-size: 12px;
        color: #6c757d;
        margin-top: 8px;
      }

      /* Responsive adjustments */
      @media (max-width: 768px) {
        .row.g-4 > div {
          margin-bottom: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-12">
          <!-- Title -->
          <h1
            class="text-center mb-5 fw-bold"
            style="color: #ff6fa5; font-size: 3rem"
          >
            Pinky Flow
          </h1>

          <!-- Main Content Grid (Side by Side) -->
          <div class="row g-4">
            <!-- LEFT: Timer Card -->
            <div class="col-lg-6">
              <div class="card shadow-lg p-4" style="height: 100%">
                <div class="btn-group mb-4 d-flex gap-3" role="group">
                  <button
                    type="button"
                    class="btn btnOutline active"
                    onclick="setMode('work')"
                  >
                    💮 Work
                  </button>
                  <button
                    type="button"
                    class="btn btnOutline"
                    onclick="setMode('short')"
                  >
                    💮 Short Break
                  </button>
                  <button
                    type="button"
                    class="btn btnOutline"
                    onclick="setMode('long')"
                  >
                    💮 Long Break
                  </button>
                </div>

                <div class="display-1 fw-bold mb-3 text-center mt-3" id="timer">
                  25:00
                </div>

                <div class="progress mb-4" style="height: 10px">
                  <div
                    id="progress-bar"
                    class="progress-bar"
                    role="progressbar"
                    style="width: 100%"
                  ></div>
                </div>

                <div class="d-flex justify-content-center gap-3">
                  <button
                    id="start-btn"
                    class="btn btn-lg px-4"
                    onclick="toggleTimer()"
                    style="
                      background-color: #ff6fa5;
                      font-weight: bold;
                      color: white;
                    "
                  >
                    Start
                  </button>
                  <button
                    class="btn btn-secondary btn-lg px-4"
                    style="font-weight: bold"
                    onclick="resetTimer()"
                  >
                    Reset
                  </button>
                </div>
              </div>
            </div>

            <!-- RIGHT: Task Card -->
            <div class="col-lg-6">
              <div class="card shadow-lg p-4" style="height: 100%">
                <h5 class="mb-3">🎯 Tasks for Today</h5>

                <!-- Add Task Form -->
                <div class="input-group mb-4">
                  <input
                    type="text"
                    id="task-input"
                    class="form-control"
                    placeholder="Add a new task..."
                    onkeypress="if (event.key === 'Enter') addTaskManually();"
                  />
                  <button
                    class="btn"
                    type="button"
                    onclick="addTaskManually()"
                    style="
                      background-color: #ff6fa5;
                      color: white;
                      font-weight: bold;
                    "
                  >
                    Add Task
                  </button>
                </div>

                <!-- Task Table -->
                <div
                  style="overflow-x: auto; max-height: 400px; overflow-y: auto"
                >
                  <table class="table table-hover task-table">
                    <thead
                      style="
                        position: sticky;
                        top: 0;
                        background-color: #f8f9fa;
                        z-index: 10;
                      "
                    >
                      <tr>
                        <th style="width: 30px; text-align: center">Done</th>
                        <th>Task</th>
                        <th
                          style="
                            width: 100px;
                            text-align: center;
                            font-size: 12px;
                          "
                        >
                          Time
                        </th>
                        <th style="width: 70px; text-align: center">Action</th>
                      </tr>
                    </thead>
                    <tbody id="task-table-body">
                      <!-- Tasks will be added here dynamically -->
                    </tbody>
                  </table>
                </div>

                <!-- Task Stats -->
                <div class="task-count text-center">
                  <span id="task-stats">0 tasks • 0 completed</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
